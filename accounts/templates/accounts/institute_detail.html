<!DOCTYPE html>
<html>
<head>
    <title>{{ institute.name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <a href="/institutes/" class="btn btn-secondary mb-3">
        ← Back
    </a>

    <div class="card shadow">
        <div class="card-body">

            <span class="badge bg-primary mb-3">
                {{ institute.category }}
            </span>

            <h1>{{ institute.name }}</h1>

            <hr>

            <p>
                <b>Address:</b><br>
                {{ institute.address }}
            </p>

            {% if institute.contact_number %}
            <p>
                <b>Contact:</b>
                {{ institute.contact_number }}
            </p>
            {% endif %}

            <div class="mt-4">

                {% if institute.website %}
                <a
                    href="{{ institute.website }}"
                    target="_blank"
                    class="btn btn-success"
                >
                    Official Website
                </a>
                {% endif %}

                <a
                    href="https://www.google.com/maps/search/?api=1&query={{ institute.address|urlencode }}"
                    target="_blank"
                    class="btn btn-primary"
                >
                    View on Google Maps
                </a>

            </div>

        </div>
    </div>

</div>

</body>
</html>
