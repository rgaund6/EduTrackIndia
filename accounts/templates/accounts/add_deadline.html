{% extends "accounts/base.html" %}

{% block title %}Add Deadline - EduConnect{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-calendar-plus"></i> Add Admission Deadline
                    </h4>
                </div>

                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Deadline Type *</label>
                            <select name="deadline_type" class="form-select" required>
                                <option value="">Select Type</option>
                                <option value="exam">Exam Registration</option>
                                <option value="application">Application Deadline</option>
                                <option value="admission">Admission Registration</option>
                                <option value="counselling">Counselling Date</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">College (Optional)</label>
                            <select name="college_id" class="form-select">
                                <option value="">Select College</option>
                                {% for college in colleges %}
                                    <option value="{{ college.id }}">{{ college.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Deadline Date *</label>
                            <input type="date" name="deadline_date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" 
                                      placeholder="e.g., Final submission for BTech admission"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-plus"></i> Add Deadline
                            </button>
                            <a href="{% url 'admission_deadlines' %}" class="btn btn-outline-secondary btn-lg">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
